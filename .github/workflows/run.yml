name: Daily Beauty Trend Analysis
on:
  schedule:
    - cron: '0 0 * * *' # 日本時間 朝9時
  workflow_dispatch:

jobs:
  analyze-and-store:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ファイルが確実に存在するか確認するデバッグ工程を追加
      - name: Check file existence
        run: |
          ls -R
          if [ ! -f "main.py" ]; then
            echo "❌ main.py が見つかりません。リポジトリの直下に配置してください。"
            exit 1
          fi

      - name: Create GCP Key File
        run: echo '${{ secrets.GCP_SA_KEY }}' > ${{ github.workspace }}/gcp_key.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pytrends google-cloud-bigquery openai requests

      - name: Run Analysis
        # 認証ファイルのパスを環境変数にセットして実行
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp_key.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
        run: python main.py
